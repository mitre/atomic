# tox (https://tox.readthedocs.io/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it, "pip install tox"
# and then run "tox" from this directory.

[tox]
skipsdist = True
envlist =
    py310
    py311
    py312
    py313
    coverage
skip_missing_interpreters = true

[testenv]
description = run tests
passenv =
    TOXENV
    CI
    TRAVIS
    TRAVIS_*
    CODECOV_*
deps =
    pytest
    pytest-asyncio
    coverage
changedir = {toxinidir}
commands =
    coverage run -p -m pytest --tb=short -Werror {posargs}

[testenv:coverage]
deps =
    coverage
skip_install = true
changedir = {toxinidir}
commands =
    coverage combine
    coverage html
    coverage report

[testenv:coverage-ci]
deps =
    coverage
skip_install = true
changedir = {toxinidir}
commands =
    coverage combine
    coverage xml
    coverage report
